# Third Eye Worldwide — single-command deploy
#
# Usage:
#   1. cp .env.example .env
#   2. edit .env; set NEXTAUTH_SECRET (`openssl rand -base64 32`) and admin creds
#   3. docker compose up -d --build
#
# Defaults to SQLite in a named volume (teww-data). For Postgres, see
# DEPLOYMENT.md — change DATABASE_URL + prisma/schema.prisma provider.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: third-eye-worldwide:latest
    container_name: teww-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # SQLite DB lives inside the named volume so data survives rebuilds.
      DATABASE_URL: file:/data/teww.db
      # Auth — both required in production; compose refuses to start without them.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # First-run admin seed (only applied if the User table is empty).
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-admin@teww.local}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:?set CMS_ADMIN_PASSWORD in .env}
    volumes:
      - teww-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/api/auth/csrf"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  teww-data:
